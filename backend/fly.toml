# Change this app name before deploying:
# fly apps create your-child-health-backend-name
app = "child-health-record-backend"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[env]
  DATA_DIR = "/data"
  NODE_ENV = "production"

[[mounts]]
  source = "child_health_data"
  destination = "/data"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
